<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UniMatch Email Confirmed</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #1d1d1f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        margin: 0 auto 18px;
        display: block;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 650;
      }

      p {
        margin: 0 0 18px;
        color: #636366;
        font-size: 15px;
        line-height: 1.45;
      }

      a {
        color: #1d1d1f;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="mark" src="./Logo_1.png" alt="UniMatch" />
      <h1 id="title">Confirming email</h1>
      <p id="message">Please wait while UniMatch confirms your account.</p>
      <p id="close" hidden>You can close this browser tab now.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "__SUPABASE_URL__";
      const supabaseKey = "__SUPABASE_KEY__";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const close = document.getElementById("close");

      confirmEmail();

      async function confirmEmail() {
        try {
          if (!supabaseUrl || !supabaseKey) {
            throw new Error("Supabase settings are missing on this callback page.");
          }

          const url = new URL(window.location.href.replace("#", "?"));
          const code = url.searchParams.get("code");
          const accessToken = url.searchParams.get("access_token");
          const refreshToken = url.searchParams.get("refresh_token");

          if (code) {
            const { error } = await client.auth.exchangeCodeForSession(code);
            if (error) throw error;
          } else if (accessToken && refreshToken) {
            const { error } = await client.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken,
            });
            if (error) throw error;
          } else {
            throw new Error("This confirmation link is missing its login code.");
          }

          title.textContent = "Email confirmed";
          message.textContent = "Your UniMatch account is confirmed. Go back to Expo Go and sign in.";
          close.hidden = false;
        } catch (error) {
          title.textContent = "Confirmation failed";
          message.textContent = error.message || "Could not confirm this email link.";
        }
      }
    </script>
  </body>
</html>
