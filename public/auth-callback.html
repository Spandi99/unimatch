<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UniMatch Email Confirmed</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #1d1d1f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        background: #1d1d1f;
        color: #ffffff;
        font-weight: 700;
        font-size: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 650;
      }

      p {
        margin: 0 0 18px;
        color: #636366;
        font-size: 15px;
        line-height: 1.45;
      }

      a {
        color: #1d1d1f;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">U</div>
      <h1>Email confirmed</h1>
      <p>Your UniMatch account is confirmed. Go back to Expo Go and sign in with your email and password.</p>
      <p>You can close this browser tab now.</p>
    </main>
  </body>
</html>
