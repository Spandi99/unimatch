<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset UniMatch Password</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #1d1d1f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 420px);
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        background: #1d1d1f;
        color: #ffffff;
        font-weight: 700;
        font-size: 22px;
      }

      h1, p {
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 650;
      }

      p {
        margin: 0 0 18px;
        color: #636366;
        font-size: 15px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 650;
      }

      input {
        width: 100%;
        height: 48px;
        padding: 0 12px;
        border: 1px solid #d1d1d6;
        border-radius: 10px;
        box-sizing: border-box;
        font-size: 16px;
      }

      button {
        width: 100%;
        height: 48px;
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        background: #1d1d1f;
        color: #ffffff;
        font-size: 15px;
        font-weight: 650;
      }

      #message {
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">U</div>
      <h1>Reset password</h1>
      <p>Choose a new password, then go back to Expo Go and sign in.</p>
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" autocomplete="new-password" />
      <button id="save" type="button">Save new password</button>
      <p id="message"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "__SUPABASE_URL__";
      const supabaseKey = "__SUPABASE_KEY__";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);
      const message = document.getElementById("message");
      const save = document.getElementById("save");

      initSession();

      save.addEventListener("click", async () => {
        const password = document.getElementById("password").value;
        if (password.length < 8) {
          message.textContent = "Use at least 8 characters.";
          return;
        }

        save.disabled = true;
        message.textContent = "Saving...";
        const { error } = await client.auth.updateUser({ password });
        save.disabled = false;

        if (error) {
          message.textContent = error.message;
          return;
        }

        message.textContent = "Password updated. Go back to Expo Go and sign in.";
      });

      async function initSession() {
        try {
          const url = new URL(window.location.href.replace("#", "?"));
          const code = url.searchParams.get("code");
          const accessToken = url.searchParams.get("access_token");
          const refreshToken = url.searchParams.get("refresh_token");

          if (code) {
            const { error } = await client.auth.exchangeCodeForSession(code);
            if (error) throw error;
          } else if (accessToken && refreshToken) {
            const { error } = await client.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken,
            });
            if (error) throw error;
          }
        } catch (error) {
          message.textContent = error.message || "Could not open this password reset link.";
        }
      }
    </script>
  </body>
</html>
